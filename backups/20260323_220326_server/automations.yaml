- id: printer_error_notification
  alias: '[打印] 打印错误通知'
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.a1mini_0300aa5a1600497_print_error
    to: 'on'
  - platform: state
    entity_id: binary_sensor.p2s_22e8bj5a2401765_print_error
    to: 'on'
  condition:
  - condition: state
    entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
    state: 有人
  action:
  - service: notify.send_message
    target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: "{% if trigger.entity_id == 'binary_sensor.a1mini_0300aa5a1600497_print_error'
        %}\n  注意，A1 Mini 打印机出现错误，请检查！\n{% else %}\n  注意，P2S 打印机出现错误，请检查！\n{% endif
        %}\n"
- id: printer_remaining_time
  alias: '[打印] 打印机剩余时间播报'
  triggers:
  - trigger: state
    entity_id:
    - event.xiaomi_cn_1175403807_hub1_virtual_event_e_4_1
    attribute: 事件名称
    to:
    - 打印剩余时间
  conditions:
  - condition: template
    value_template: '{% set a1mini = states(''sensor.a1mini_0300aa5a1600497_remaining_time'')
      %} {% set p2s = states(''sensor.p2s_22e8bj5a2401765_remaining_time'') %} {{
      (a1mini != ''unknown'' and a1mini | float > 0) or (p2s != ''unknown'' and p2s
      | float > 0) }}

      '
    enabled: true
  actions:
  - target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: "{% set a1mini = states('sensor.a1mini_0300aa5a1600497_remaining_time')
        %} {% set p2s = states('sensor.p2s_22e8bj5a2401765_remaining_time') %} {%
        set a1mini_hours = a1mini | float(0) | int %} {% set a1mini_mins = ((a1mini
        | float(0) - a1mini_hours) * 60) | int %} {% set p2s_hours = p2s | float(0)
        | int %} {% set p2s_mins = ((p2s | float(0) - p2s_hours) * 60) | int %} {%
        if a1mini != 'unknown' and a1mini | float > 0 and p2s != 'unknown' and p2s
        | float > 0 %}\n  {% if a1mini_hours > 0 and p2s_hours > 0 %}\n    小黑奴剩余{{
        a1mini_hours }}小时{{ a1mini_mins }}分钟，大黑奴剩余{{ p2s_hours }}小时{{ p2s_mins }}分钟。\n
        \ {% elif a1mini_hours > 0 %}\n    小黑奴剩余{{ a1mini_hours }}小时{{ a1mini_mins
        }}分钟，大黑奴剩余{{ p2s_mins }}分钟。\n  {% elif p2s_hours > 0 %}\n    小黑奴剩余{{ a1mini_mins
        }}分钟，大黑奴剩余{{ p2s_hours }}小时{{ p2s_mins }}分钟。\n  {% else %}\n    小黑奴剩余{{ a1mini_mins
        }}分钟，大黑奴剩余{{ p2s_mins }}分钟。\n  {% endif %}\n{% elif a1mini != 'unknown' and
        a1mini | float > 0 %}\n  {% if a1mini_hours > 0 %}\n    小黑奴剩余{{ a1mini_hours
        }}小时{{ a1mini_mins }}分钟。\n  {% else %}\n    小黑奴剩余{{ a1mini_mins }}分钟。\n  {%
        endif %}\n{% elif p2s != 'unknown' and p2s | float > 0 %}\n  {% if p2s_hours
        > 0 %}\n    大黑奴剩余{{ p2s_hours }}小时{{ p2s_mins }}分钟。\n  {% else %}\n    大黑奴剩余{{
        p2s_mins }}分钟。\n  {% endif %}\n{% else %}\n  当前没有正在进行的打印任务。\n{% endif %}\n"
    action: notify.send_message
  mode: single
- id: printer_completion_notification
  alias: '[打印] FDM打印机打印完成通知'
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.a1mini_0300aa5a1600497_print_status
    to: 完成
  - platform: state
    entity_id: sensor.p2s_22e8bj5a2401765_print_status
    to: 完成
  condition:
  - condition: state
    entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
    state: 有人
  action:
  - service: notify.send_message
    target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: "{% if trigger.entity_id == 'sensor.a1mini_0300aa5a1600497_print_status'
        %}\n  {% set start = states('sensor.a1mini_0300aa5a1600497_start_time') %}\n
        \ {% if start != 'unknown' %}\n    {% set start_ts = as_timestamp(start) %}\n
        \   {% set now_ts = as_timestamp(now()) %}\n    {% set duration_min = ((now_ts
        - start_ts) / 60) | int %}\n    {% set hours = (duration_min / 60) | int %}\n
        \   {% set mins = duration_min % 60 %}\n    {% if hours > 0 %}\n      小黑奴打印已完成！用时{{
        hours }}小时{{ mins }}分钟。开始排气10分钟。\n    {% else %}\n      小黑奴打印已完成！用时{{ mins
        }}分钟。开始排气10分钟。\n    {% endif %}\n  {% else %}\n    小黑奴打印已完成！开始排气10分钟。\n  {%
        endif %}\n{% else %}\n  {% set start = states('sensor.p2s_22e8bj5a2401765_start_time')
        %}\n  {% if start != 'unknown' %}\n    {% set start_ts = as_timestamp(start)
        %}\n    {% set now_ts = as_timestamp(now()) %}\n    {% set duration_min =
        ((now_ts - start_ts) / 60) | int %}\n    {% set hours = (duration_min / 60)
        | int %}\n    {% set mins = duration_min % 60 %}\n    {% if hours > 0 %}\n
        \     大黑奴打印已完成！用时{{ hours }}小时{{ mins }}分钟。开始排气10分钟。\n    {% else %}\n      大黑奴打印已完成！用时{{
        mins }}分钟。开始排气10分钟。\n    {% endif %}\n  {% else %}\n    大黑奴打印已完成！开始排气10分钟。\n
        \ {% endif %}\n{% endif %}\n"
- id: daheinu_exhaust_fan
  alias: '[打印] 大黑奴打印完成排气'
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.p2s_22e8bj5a2401765_print_status
    to: 完成
  action:
  - service: switch.turn_on
    data:
      entity_id: switch.sixwgh_cn_1200175237_v8icm1_on_p_2_1
  - delay:
      minutes: 10
  - service: switch.turn_off
    data:
      entity_id: switch.sixwgh_cn_1200175237_v8icm1_on_p_2_1
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
        state: 有人
      sequence:
      - service: notify.send_message
        target:
          entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
        data:
          message: 大黑奴排气完成！
- id: xiaoheinu_exhaust_fan
  alias: '[打印] 小黑奴打印完成打开排气'
  mode: single
  trigger:
  - platform: state
