# 打印错误通知（A1 Mini 或 P2S 打印机错误，且客厅有人时语音播报）
- id: "printer_error_notification"
  alias: "打印错误通知"
  trigger:
    - platform: state
      entity_id: binary_sensor.a1mini_0300aa5a1600497_print_error
      to: "on"
    - platform: state
      entity_id: binary_sensor.p2s_22e8bj5a2401765_print_error
      to: "on"
  condition:
    - condition: state
      entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
      state: "有人"
  action:
    - service: notify.send_message
      target:
        entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
      data:
        message: >
          {% if trigger.entity_id == 'binary_sensor.a1mini_0300aa5a1600497_print_error' %}
            注意，A1 Mini 打印机出现错误，请检查！
          {% else %}
            注意，P2S 打印机出现错误，请检查！
          {% endif %}

# 打印机剩余时间播报（语音播报）
- id: "printer_remaining_time"
  alias: "打印机剩余时间播报"
  trigger:
    - platform: state
      entity_id: sensor.a1mini_0300aa5a1600497_remaining_time
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.state != 'unknown' and trigger.to_state.state | int > 0 }}"
  action:
    - service: notify.send_message
      target:
        entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
      data:
        message: "当前打印剩余时间{{ states('sensor.a1mini_0300aa5a1600497_remaining_time') }}分钟"

# 打印完成通知（仅在客厅有人时语音播报）
- id: "printer_completion_notification"
  alias: "打印完成通知"
  trigger:
    - platform: state
      entity_id: sensor.a1mini_0300aa5a1600497_print_status
      to: "完成"
  condition:
    - condition: state
      entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
      state: "有人"
  action:
    - service: notify.send_message
      target:
        entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
      data:
        message: "3D打印已完成！"

# 大黑奴打印完成排气
- id: "daheinu_exhaust_fan"
  alias: "大黑奴打印完成排气"
  trigger:
    - platform: state
      entity_id: sensor.a1mini_0300aa5a1600497_print_status
      to: "完成"
  action:
    - service: switch.turn_on
      data:
        entity_id: switch.exhaust_fan
    - delay:
        minutes: 10
    - service: switch.turn_off
      data:
        entity_id: switch.exhaust_fan
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
              state: "有人"
          sequence:
            - service: notify.send_message
              target:
                entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
              data:
                message: "大黑奴打印完成，排气已开启！"

# 小黑奴打印完成打开排气
