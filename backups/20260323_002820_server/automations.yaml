# Ams 1湿度大于50发通知（语音播报）
- id: "ams_humidity_notification"
  alias: "Ams 1湿度大于50发通知"
  trigger:
    - platform: numeric_state
      entity_id: sensor.p2s_22e8bj5a2401765_ams_1_humidity
      above: 50
  action:
    - service: notify.send_message
      target:
        entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
      data:
        message: "注意，AMS湿度大于50%，请检查！"

# ==================== 灯亮时长统计自动化（每个灯单独统计） ====================
# 每10秒自动累加

# ==================== 客厅吸顶灯 ====================
- alias: "客厅吸顶灯亮时长累加"
  trigger:
    - platform: time_pattern
      seconds: "/10"
  condition:
    - condition: state
      entity_id: light.jdjz_cn_857569251_jdjzu1_s_2_light
      state: "on"
  action:
    - service: input_number.set_value
      data:
        value: "{{ states('input_number.light_jdjz_duration')|float(0) + 10 }}"
      target:
        entity_id: input_number.light_jdjz_duration

