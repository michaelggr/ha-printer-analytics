# ==================== 每日重置所有灯亮时长 ====================
- alias: "每日重置所有灯亮时长"
  trigger:
    - platform: time
      at: "00:00:00"
  action:
    - service: input_number.set_value
      data:
        value: 0
      target:
        entity_id:
          - input_number.light_jdjz_duration
          - input_number.light_sofa_duration
          - input_number.light_bedroom_duration
          - input_number.light_bedroom_strip_duration
          - input_number.light_kitchen_duration
          - input_number.light_dining_duration
          - input_number.light_bathroom_duration
          - input_number.light_yuba_duration
          - input_number.light_hallway_main_duration
          - input_number.light_hallway_bath_duration
          - input_number.light_doorway_duration
