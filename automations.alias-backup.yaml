        \     жҫ¶СҮзІҰжҝӮеӯҳеўҰйҚ—жқҝеҮЎзҖ№еұҫеһҡй”ӣдҪәж•ӨйҸғз§ў{ hours }}зҒҸеҝ”жӨӮ{{ mins }}йҚ’е—ӣжҢ“йҠҶеӮҡзҙ‘жҝ®е¬«её“е§ҳ?0йҚ’е—ӣжҢ“йҠҶдҝ“n    {% else %}\n      жҫ¶СҮзІҰжҝӮеӯҳеўҰйҚ—жқҝеҮЎзҖ№еұҫеһҡй”ӣдҪәж•ӨйҸғз§ў{
        mins }}йҚ’е—ӣжҢ“йҠҶеӮҡзҙ‘жҝ®е¬«её“е§ҳ?0йҚ’е—ӣжҢ“йҠҶдҝ“n    {% endif %}\n  {% else %}\n    жҫ¶СҮзІҰжҝӮеӯҳеўҰйҚ—жқҝеҮЎзҖ№еұҫеһҡй”ӣдҪёзҙ‘жҝ®е¬«её“е§ҳ?0йҚ’е—ӣжҢ“йҠҶдҝ“n
