        > 0 %}\n  йҺөж’іеөғж¶“о…Ёзҙқжҫ¶СҮзІҰжҝӮжқ‘еўҝжөЈжӘЈ{ format_time(p2s_hours, p2s_mins) }}й”ӣеІ„о•©з’Ғо”Ғ{ get_completion_time(p2s)
