  alias: '[区域] 门口访问计数（v2）'
  mode: queued
  triggers:
  - platform: state
    entity_id: sensor.linp_cn_2079761645_ld6bcw_has_someone_duration_p_5_3
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state.state == ''0分钟'' and trigger.to_state.state
      != ''0分钟'' }}

      '
  actions:
  - service: counter.increment
    target:
      entity_id: counter.doorway_visits
- id: region_stay_duration_accumulate_v2
  alias: '[区域] 停留时长累加（v2）'
  mode: single
  triggers:
  - platform: time_pattern
    seconds: /30
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
        state: 有人
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.living_room_duration
        data:
          value: '{{ states(''input_number.living_room_duration'')|float(0) + 30 }}'
    - conditions:
      - condition: state
        entity_id: sensor.linp_cn_blt_3_1ocv0fv7l0o00_es5b_occupancy_status_p_2_1078
        state: 有人
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.bedroom_duration
        data:
          value: '{{ states(''input_number.bedroom_duration'')|float(0) + 30 }}'
    - conditions:
      - condition: state
        entity_id: sensor.linp_cn_1137697716_lp1bc_occupancy_status_p_5_1
        state: SomeOne
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.kitchen_duration
        data:
          value: '{{ states(''input_number.kitchen_duration'')|float(0) + 30 }}'
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.linp_cn_blt_3_1n49ffqescc00_es2_occupancy_status_p_2_1078'')
          not in [''无人_4'', ''无人''] }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.dining_duration
        data:
          value: '{{ states(''input_number.dining_duration'')|float(0) + 30 }}'
    - conditions:
      - condition: state
        entity_id: sensor.linp_cn_1137691863_lp1bc_occupancy_status_p_5_1
        state: SomeOne
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.bathroom_duration
        data:
          value: '{{ states(''input_number.bathroom_duration'')|float(0) + 30 }}'
    - conditions:
      - condition: state
        entity_id: sensor.linp_cn_1161876236_hb01_occupancy_status_p_2_1
        state: 有人
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.hallway_duration
        data:
          value: '{{ states(''input_number.hallway_duration'')|float(0) + 30 }}'
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.linp_cn_2079761645_ld6bcw_has_someone_duration_p_5_3'').split(''分钟'')[0]
          | float(0) > 0 }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.doorway_duration
        data:
          value: '{{ states(''input_number.doorway_duration'')|float(0) + 30 }}'
- id: region_daily_reset_v2
  alias: '[区域] 每日重置访问与停留（v2）'
  mode: single
  triggers:
  - platform: time
    at: 00:00:00
  actions:
  - service: counter.reset
    target:
      entity_id:
      - counter.living_room_visits
      - counter.bedroom_visits
      - counter.kitchen_visits
      - counter.dining_visits
      - counter.bathroom_visits
      - counter.hallway_visits
      - counter.doorway_visits
  - service: input_number.set_value
    data:
      value: 0
    target:
      entity_id:
      - input_number.living_room_duration
      - input_number.bedroom_duration
      - input_number.kitchen_duration
      - input_number.dining_duration
      - input_number.bathroom_duration
      - input_number.hallway_duration
      - input_number.doorway_duration

