  - platform: state
    entity_id: sensor.linp_cn_blt_3_1ocv0fv7l0o00_es5b_occupancy_status_p_2_1078
    from: 无人
    to: 有人
  actions:
  - service: counter.increment
    target:
      entity_id: counter.bedroom_visits
- id: region_visit_counter_kitchen_v2
  alias: '[区域] 厨房访问计数（v2）'
  mode: queued
  triggers:
  - platform: state
    entity_id: sensor.linp_cn_1137697716_lp1bc_occupancy_status_p_5_1
    from: NoOne
    to: SomeOne
  actions:
  - service: counter.increment
