- id: printer_remaining_time
  alias: '[打印] 打印机剩余时间播报'
  mode: single
  triggers:
  - platform: state
    entity_id: event.xiaomi_cn_1175403807_hub1_virtual_event_e_4_1
  conditions:
  - condition: template
    value_template: '{{ state_attr(''event.xiaomi_cn_1175403807_hub1_virtual_event_e_4_1'',
      ''事件名称'') == ''打印剩余时间'' }}'
  actions:
  - service: notify.send_message
    target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: '{% set a1mini = states(''sensor.a1mini_0300aa5a1600497_remaining_time'')
        %} {% set p2s = states(''sensor.p2s_22e8bj5a2401765_remaining_time'') %} {%
        set now = now() %} {% set ns = namespace(a1mini_hours=0, a1mini_mins=0, p2s_hours=0,
        p2s_mins=0) %} {% if a1mini not in [''unknown'', ''unavailable'', ''''] %}
        {% set ns.a1mini_hours = a1mini | float(default=0) %} {% set ns.a1mini_mins
        = ((ns.a1mini_hours - ns.a1mini_hours | int) * 60) | int %} {% endif %} {%
        if p2s not in [''unknown'', ''unavailable'', ''''] %} {% set ns.p2s_hours
        = p2s | float(default=0) %} {% set ns.p2s_mins = ((ns.p2s_hours - ns.p2s_hours
        | int) * 60) | int %} {% endif %} {% macro format_time(hours, mins) %} {%
        if hours > 0 and mins > 0 %} {{ hours }}小时{{ mins }}分钟 {% elif hours > 0 %}
        {{ hours }}小时 {% elif mins > 0 %} {{ mins }}分钟 {% else %} 即将完成 {% endif %}
        {% endmacro %} {% macro get_completion_time(remaining) %} {% if remaining
        not in [''unknown'', ''unavailable'', ''''] %} {{ (now + timedelta(hours=remaining
        | float(default=0))).strftime(''%H:%M'') }} {% else %} 未知 {% endif %} {% endmacro
        %} {% if a1mini not in [''unknown'', ''unavailable'', ''''] and a1mini | float(default=0)
        > 0 and p2s not in [''unknown'', ''unavailable'', ''''] and p2s | float(default=0)
        > 0 %} 打印中，小黑奴剩余{{ format_time(ns.a1mini_hours | int, ns.a1mini_mins) }}，预计{{
        get_completion_time(a1mini) }}完成；大黑奴剩余{{ format_time(ns.p2s_hours | int, ns.p2s_mins)
        }}，预计{{ get_completion_time(p2s) }}完成。 {% elif a1mini not in [''unknown'',
        ''unavailable'', ''''] and a1mini | float(default=0) > 0 %} 打印中，小黑奴剩余{{ format_time(ns.a1mini_hours
        | int, ns.a1mini_mins) }}，预计{{ get_completion_time(a1mini) }}完成。 {% elif p2s
        not in [''unknown'', ''unavailable'', ''''] and p2s | float(default=0) > 0
        %} 打印中，大黑奴剩余{{ format_time(ns.p2s_hours | int, ns.p2s_mins) }}，预计{{ get_completion_time(p2s)
        }}完成。 {% else %} 当前没有正在进行的打印任务。 {% endif %}

        '
- id: printer_completion_notification
  alias: '[打印] FDM 打印机打印完成通知'
  triggers:
  - entity_id:
    - sensor.a1mini_0300aa5a1600497_print_status
    to:
    - 完成
    - finish
    trigger: state
  - entity_id:
    - sensor.p2s_22e8bj5a2401765_print_status
    to:
    - 完成
    - finish
    trigger: state
  conditions:
  - condition: state
    entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
    state: 有人
  actions:
  - target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: "{% if trigger.entity_id == 'sensor.a1mini_0300aa5a1600497_print_status'
        %}\n  {% set start = states('sensor.a1mini_0300aa5a1600497_start_time') %}\n
        \ {% if start != 'unknown' %}\n    {% set start_ts = as_timestamp(start) %}\n
        \   {% set now_ts = as_timestamp(now()) %}\n    {% set duration_min = ((now_ts
        - start_ts) / 60) | int %}\n    {% set hours = (duration_min / 60) | int %}\n
        \   {% set mins = duration_min % 60 %}\n    {% if hours > 0 %}\n      小黑奴打印已完成！用时{{
        hours }}小时{{ mins }}分钟。开始排气10分钟。\n    {% else %}\n      小黑奴打印已完成！用时{{ mins
        }}分钟。开始排气10分钟。\n    {% endif %}\n  {% else %}\n    小黑奴打印已完成！开始排气10分钟。\n  {%
        endif %}\n{% else %}\n  {% set start = states('sensor.p2s_22e8bj5a2401765_start_time')
        %}\n  {% if start != 'unknown' %}\n    {% set start_ts = as_timestamp(start)
        %}\n    {% set now_ts = as_timestamp(now()) %}\n    {% set  duration_min =
        ((now_ts - start_ts) / 60) | int %}\n    {% set hours = (duration_min / 60)
        | int %}\n    {% set mins = duration_min % 60 %}\n    {% if hours > 0 %}\n
        \     大黑奴打印已完成！用时{{ hours }}小时{{ mins }}分钟。开始排气10分钟。\n    {% else %}\n      大黑奴打印已完成！用时{{
        mins }}分钟。开始排气10分钟。\n    {% endif %}\n  {% else %}\n    大黑奴打印已完成！开始排气10分钟。\n
        \ {% endif %}\n{% endif %}\n"
    action: notify.send_message
  mode: single
- id: daheinu_exhaust_fan
  alias: '[打印] 大黑奴打印完成排气'
  triggers:
  - entity_id:
    - sensor.p2s_22e8bj5a2401765_print_status
    to:
    - finish
    - failed
    trigger: state
    from:
    - running
  actions:
  - target:
      entity_id: switch.sixwgh_cn_1200174207_v7icm_on_p_2_1
    action: switch.turn_on
  - delay:
      minutes: 10
  - target:
      entity_id: switch.sixwgh_cn_1200174207_v7icm_on_p_2_1
    action: switch.turn_off
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
        state: 有人
      sequence:
      - target:
          entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
        data:
          message: 大黑奴排气完成！
        action: notify.send_message
  mode: single
