<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🖨️ 打印机历史记录 - Printer Analytics</title>
  
  <!-- PWA支持 -->
  <meta name="theme-color" content="#03a9f4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    /* 加载动画 */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #03a9f4, #00bcd4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: white;
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
    .loading-subtext {
      color: rgba(255,255,255,0.8);
      margin-top: 8px;
      font-size: 14px;
    }

    /* 错误提示 */
    .error-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(244,67,54,0.95);
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      z-index: 10000;
      display: none;
      max-width: 90%;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- 加载屏幕 -->
<div class="loading-screen" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载打印机历史...</div>
  <div class="loading-subtext">Printer Analytics v1.0</div>
</div>

<!-- 错误提示 -->
<div class="error-hint" id="error-hint"></div>

<script>
  // 检测是否在Home Assistant环境中
  const isInHA = window.hass || location.pathname.includes('/local/') || 
                 document.referrer.includes('homeassistant');

  console.log('[History Page] 环境检测:', isInHA ? 'Home Assistant内' : '独立访问');

  // 配置（从URL参数动态读取，支持自定义）
  const urlParams = new URLSearchParams(location.search);
  window.PRINTER_HISTORY_CONFIG = {
    print_history: urlParams.get('sensor') || 'sensor.p2s_p2s_da_yin_li_shi',
    printer_name: urlParams.get('printer') || 'P2S',
    refresh_interval: 30000  // 30秒自动刷新
  };
  
  console.log('[History Page] ✅ 配置加载完成 - 传感器:', window.PRINTER_HISTORY_CONFIG.print_history);

  // 主加载函数
  async function loadPage() {
    try {
      // 如果在HA环境外，尝试获取hass对象
      if (!window.hass) {
        // 尝试从父窗口或全局变量获取
        if (window.parent && window.parent.hass) {
          window.hass = window.parent.hass;
          console.log('[History Page] 从父窗口获取HASS实例');
        } else {
          // 尝试通过HA API获取token
          const tokenMatch = location.search.match(/[?&]authToken=([^&]+)/);
          if (tokenMatch) {
            console.log('[History Page] 检测到authToken参数');
          }
        }
      }

      // 动态加载主脚本
      const script = document.createElement('script');
      
      // 根据环境选择加载方式
      if (isInHA) {
        // HA内部：使用相对路径
        script.src = '/local/printer-history-page.js?v=1.2';
      } else {
        // 外部访问：使用完整URL
        const baseUrl = location.origin;
        script.src = `${baseUrl}/local/printer-history-page.js?v=1.2`;
      }
      
      script.onload = function() {
        console.log('[History Page] ✅ 主脚本加载成功');
        
        // 隐藏加载屏幕
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.classList.add('fade-out');
            setTimeout(() => loading.remove(), 500);
          }
        }, 500);
      };
      
      script.onerror = function(error) {
        console.error('[History Page] ❌ 脚本加载失败:', error);
        showError('无法加载历史记录页面，请检查网络连接或联系管理员');
        hideLoading();
      };

      document.head.appendChild(script);

    } catch (error) {
      console.error('[History Page] 初始化错误:', error);
      showError(error.message || '页面加载失败');
      hideLoading();
    }
  }

  function showError(message) {
    const hint = document.getElementById('error-hint');
    if (hint) {
      hint.textContent = '⚠️ ' + message;
      hint.style.display = 'block';
      
      // 5秒后自动隐藏
      setTimeout(() => {
        hint.style.display = 'none';
      }, 5000);
    }
  }

  function hideLoading() {
    const loading = document.getElementById('loading');
    if (loading) {
      loading.classList.add('fade-out');
      setTimeout(() => loading.remove(), 500);
    }
  }

  // 页面加载完成后启动
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPage);
  } else {
    loadPage();
  }

  // 全局错误捕获
  window.addEventListener('error', function(event) {
    console.error('[History Page] 全局错误:', event.error);
    showError('页面运行出错: ' + (event.message || '未知错误'));
  });

  // 未处理的Promise rejection
  window.addEventListener('unhandledrejection', function(event) {
    console.error('[History Page] Promise错误:', event.reason);
    showError('异步操作失败: ' + (event.reason?.message || '未知错误'));
  });

  console.log('%c 🖨️ Printer History v1.0 ', 
    'background: linear-gradient(135deg, #03a9f4, #00bcd4); color: white; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: bold;');
  console.log('%c 基于Printer Analytics插件 ', 
    'color: #666; font-size: 12px;');
</script>

</body>
</html>
