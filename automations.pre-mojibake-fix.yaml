- id: printer_error_notification
  alias: '[打印] 打印错误通知'
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.a1mini_0300aa5a1600497_print_error
    to: 'on'
  - platform: state
    entity_id: binary_sensor.p2s_22e8bj5a2401765_print_error
    to: 'on'
  condition:
  - condition: state
    entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
    state: 鏈変汉
  action:
  - service: notify.send_message
    target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: "{% if trigger.entity_id == 'binary_sensor.a1mini_0300aa5a1600497_print_error'
        %}\n  娉ㄦ剰锛孉1 Mini 鎵撳嵃鏈哄嚭鐜伴敊璇紝璇锋鏌ワ紒\n{% else %}\n  娉ㄦ剰锛孭2S 鎵撳嵃鏈哄嚭鐜伴敊璇紝璇锋鏌ワ紒\n{% endif
        %}\n"
- id: virtual_event_broadcast
  alias: '[系统] 中枢网关虚拟事件播报'
  mode: single
  trigger:
  - platform: event
    event_type: state_changed
    event_data:
      entity_id: event.xiaomi_cn_1175403807_hub1_virtual_event_e_4_1
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state not in [''unavailable'', ''unknown'',
      ''''] }}'
  action:
  - service: notify.send_message
    target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: 铏氭嫙浜嬩欢鍙戠敓锛歿{ trigger.to_state.state }}
- id: printer_remaining_time
  alias: '[打印] 打印机剩余时间播报'
  mode: single
  trigger:
  - platform: state
    entity_id: event.xiaomi_cn_1175403807_hub1_virtual_event_e_4_1
  condition:
  - condition: template
    value_template: '{{ state_attr(''event.xiaomi_cn_1175403807_hub1_virtual_event_e_4_1'',
      ''浜嬩欢鍚嶇О'') == ''鎵撳嵃鍓╀綑鏃堕棿'' }}'
  action:
  - service: notify.send_message
    target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: "{% set a1mini = states('sensor.a1mini_0300aa5a1600497_remaining_time')
        %} {% set p2s = states('sensor.p2s_22e8bj5a2401765_remaining_time') %} {%
        set now = now() %}\n{% macro format_time(hours, mins) %}\n  {% if hours >
        0 and mins > 0 %}\n    {{ hours }}灏忔椂{{ mins }}鍒嗛挓\n  {% elif hours > 0 %}\n
        \   {{ hours }}灏忔椂\n  {% elif mins > 0 %}\n    {{ mins }}鍒嗛挓\n  {% else %}\n
        \   鍗冲皢瀹屾垚\n  {% endif %}\n{% endmacro %}\n{% macro get_completion_time(remaining)
        %}\n  {% if remaining != 'unknown' %}\n    {{ (now + timedelta(hours=remaining
        | float(0))).strftime('%H:%M') }}\n  {% else %}\n    鏈煡\n  {% endif %}\n{%
        endmacro %}\n{% set a1mini_hours = a1mini | float(0) | int %} {% set a1mini_mins
        = ((a1mini | float(0) - a1mini_hours) * 60) | int %} {% set p2s_hours = p2s
        | float(0) | int %} {% set p2s_mins = ((p2s | float(0) - p2s_hours) * 60)
        | int %}\n{% if a1mini != 'unknown' and a1mini | float > 0 and p2s != 'unknown'
        and p2s | float > 0 %}\n  鎵撳嵃涓紝灏忛粦濂村墿浣檣{ format_time(a1mini_hours, a1mini_mins)
        }}锛岄璁{ get_completion_time(a1mini) }}瀹屾垚锛涘ぇ榛戝ゴ鍓╀綑{{ format_time(p2s_hours, p2s_mins)
        }}锛岄璁{ get_completion_time(p2s) }}瀹屾垚銆俓n{% elif a1mini != 'unknown' and a1mini
        | float > 0 %}\n  鎵撳嵃涓紝灏忛粦濂村墿浣檣{ format_time(a1mini_hours, a1mini_mins) }}锛岄璁{
        get_completion_time(a1mini) }}瀹屾垚銆俓n{% elif p2s != 'unknown' and p2s | float
        > 0 %}\n  鎵撳嵃涓紝澶ч粦濂村墿浣檣{ format_time(p2s_hours, p2s_mins) }}锛岄璁{ get_completion_time(p2s)
        }}瀹屾垚銆俓n{% else %}\n  褰撳墠娌℃湁姝ｅ湪杩涜鐨勬墦鍗颁换鍔°€俓n{% endif %}\n"
- id: printer_completion_notification
  alias: '[打印] FDM 打印机打印完成通知'
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.a1mini_0300aa5a1600497_print_status
    to: 瀹屾垚
  - platform: state
    entity_id: sensor.p2s_22e8bj5a2401765_print_status
    to: 瀹屾垚
  condition:
  - condition: state
    entity_id: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
    state: 鏈変汉
  action:
  - service: notify.send_message
    target:
      entity_id: notify.xiaomi_cn_338143536_lx5a_play_text_a_5_1
    data:
      message: "{% if trigger.entity_id == 'sensor.a1mini_0300aa5a1600497_print_status'
        %}\n  {% set start = states('sensor.a1mini_0300aa5a1600497_start_time') %}\n
        \ {% if start != 'unknown' %}\n    {% set start_ts = as_timestamp(start) %}\n
        \   {% set now_ts = as_timestamp(now()) %}\n    {% set duration_min = ((now_ts
        - start_ts) / 60) | int %}\n    {% set hours = (duration_min / 60) | int %}\n
        \   {% set mins = duration_min % 60 %}\n    {% if hours > 0 %}\n      灏忛粦濂存墦鍗板凡瀹屾垚锛佺敤鏃秢{
        hours }}灏忔椂{{ mins }}鍒嗛挓銆傚紑濮嬫帓姘?0鍒嗛挓銆俓n    {% else %}\n      灏忛粦濂存墦鍗板凡瀹屾垚锛佺敤鏃秢{ mins
        }}鍒嗛挓銆傚紑濮嬫帓姘?0鍒嗛挓銆俓n    {% endif %}\n  {% else %}\n    灏忛粦濂存墦鍗板凡瀹屾垚锛佸紑濮嬫帓姘?0鍒嗛挓銆俓n  {%
        endif %}\n{% else %}\n  {% set start = states('sensor.p2s_22e8bj5a2401765_start_time')
        %}\n  {% if start != 'unknown' %}\n    {% set start_ts = as_timestamp(start)
        %}\n    {% set now_ts = as_timestamp(now()) %}\n    {% set duration_min =
        ((now_ts - start_ts) / 60) | int %}\n    {% set hours = (duration_min / 60)
        | int %}\n    {% set mins = duration_min % 60 %}\n    {% if hours > 0 %}\n
        \     澶ч粦濂存墦鍗板凡瀹屾垚锛佺敤鏃秢{ hours }}灏忔椂{{ mins }}鍒嗛挓銆傚紑濮嬫帓姘?0鍒嗛挓銆俓n    {% else %}\n      澶ч粦濂存墦鍗板凡瀹屾垚锛佺敤鏃秢{
        mins }}鍒嗛挓銆傚紑濮嬫帓姘?0鍒嗛挓銆俓n    {% endif %}\n  {% else %}\n    澶ч粦濂存墦鍗板凡瀹屾垚锛佸紑濮嬫帓姘?0鍒嗛挓銆俓n
        \ {% endif %}\n{% endif %}\n"
