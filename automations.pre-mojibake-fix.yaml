- id: printer_history_a1mini
  alias: '[打印] A1 Mini 打印历史记录'
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.a1mini_0300aa5a1600497_print_status
    to:
    - 澶辫触
    - 瀹屾垚
  action:
  - service: homeassistant.set_state
    target:
      entity_id: sensor.a1mini_print_history
    data:
      state: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      attributes:
        history: "{% set history = state_attr('sensor.a1mini_print_history', 'history')
          | default('[]') | from_json %} {% set now = now().strftime('%Y-%m-%d %H:%M:%S')
          %} {% set status = trigger.to_state.state %} {% set progress = states('sensor.a1mini_0300aa5a1600497_print_progress')
          | float(0) %} {% set total_weight = states('sensor.a1mini_0300aa5a1600497_print_weight')
          | float(0) %} {% set total_length = states('sensor.a1mini_0300aa5a1600497_print_length')
          | float(0) %} {% set active_tray = states('sensor.a1mini_0300aa5a1600497_active_tray')
          %} {% set filament_type = state_attr('sensor.a1mini_0300aa5a1600497_active_tray',
          'type') %} {% set color = state_attr('sensor.a1mini_0300aa5a1600497_active_tray',
          'color') %} {% set usage_weight = (total_weight * progress / 100) | round(2)
          %} {% set usage_length = (total_length * progress / 100) | round(2) %} {%
          set start_energy = states('input_text.a1mini_start_energy') | float(0) %}
          {% set end_energy = states('sensor.giot_cn_1164778814_v8icm_power_consumption_p_4_1')
          | float(0) %} {% set energy = (end_energy - start_energy) | round(2) %}
          {% set new_record = {\n  'time': now,\n  'status': status,\n  'progress':
          progress | int,\n  'material': filament_type or 'Unknown',\n  'color': color
          or '#FFFFFF',\n  'total_weight': total_weight,\n  'usage_weight': usage_weight,\n
          \ 'total_length': total_length,\n  'usage_length': usage_length,\n  'energy':
          energy | round(2)\n} %} {% set new_history = [new_record] + history %} {{
          new_history[:50] | to_json }}\n"
