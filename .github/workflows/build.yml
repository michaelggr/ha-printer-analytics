name: HACS Validate & Hassfest

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths: ['custom_components/**']
  workflow_dispatch:

jobs:
  # HACS 配置验证（检查 hacs.json、manifest.json、仓库结构等）
  validate_hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration

  # hassfest 检查（检查 manifest.json 格式、必填字段、版本号等）
  validate_hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master
