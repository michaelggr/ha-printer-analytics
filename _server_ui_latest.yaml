      - type: button
        name: 返回首页
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /lovelace/home

  # ==================== 卧室区域详情 ====================
  - title: 卧室
    icon: mdi:bed
    path: bedroom
    cards:
      - type: grid
        title: ?? 卧室灯光
        columns: 2
        cards:
          - type: light
            entity: light.ftd_cn_1124827030_dsplmp_s_2_light
            name: 卧室灯
          - type: light
            entity: light.yeelink_cn_436301383_strip6_s_2_light
            name: 灯带
      - type: entities
        title: 卧室状态
        entities:
          - entity: sensor.linp_cn_blt_3_1ocv0fv7l0o00_es5b_occupancy_status_p_2_1078
            name: 人在传感器
          - entity: sensor.wo_shi_ting_liu_shi_chang_3
            name: 停留时长
          - entity: counter.bedroom_visits
            name: 访问次数
          - entity: climate.lumi_cn_684959720_mcn02
            name: 绌鸿皟
          - entity: sensor.lumi_cn_684959720_mcn02_electric_power_p_5_1
            name: 空调功率
      - type: button
        name: 返回首页
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /lovelace/home

  # ==================== 厨房鍖哄煙璇︽儏 ====================
  - title: 厨房
    icon: mdi:stove
    path: kitchen
    cards:
      - type: light
