# Home Assistant 定制仪表板配置
# 根据实际设备自动生成
# 区域：客厅、卧室、厨房、餐厅、卫生间、走廊玄关

title: 我的智能家居
views:
  # ==================== 首页 - 区域导航 ====================
  - title: 首页
    icon: mdi:home
    path: home
    cards:
      # 快速统计
      - type: glance
        title: 快速统计
        entities:
          - entity: sensor.giot_cn_1162942256_v8icm_electric_power_p_4_2
            name: 电脑
          - entity: sensor.giot_cn_1164778814_v8icm_electric_power_p_4_2
            name: 小打印机
          - entity: sensor.sixwgh_cn_1200175237_v8icm1_electric_power_p_4_2
            name: 大打印机
          - entity: sensor.lumi_cn_684959720_mcn02_electric_power_p_5_1
            name: 绌鸿皟
        show_state: true
        show_icon: true

      # 区域导航 - 单个大格子
      - type: entities
        title: 区域导航
        entities:
          - entity: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
            name: 客厅 (点击跳转)
            icon: mdi:sofa
            tap_action:
              action: navigate
              navigation_path: /lovelace/living-room
          - entity: sensor.linp_cn_blt_3_1ocv0fv7l0o00_es5b_occupancy_status_p_2_1078
            name: 卧室 (点击跳转)
            icon: mdi:bed
            tap_action:
              action: navigate
              navigation_path: /lovelace/bedroom
          - entity: sensor.linp_cn_1137697716_lp1bc_occupancy_status_p_5_1
            name: 厨房 (点击跳转)
            icon: mdi:stove
            tap_action:
              action: navigate
              navigation_path: /lovelace/kitchen
          - entity: sensor.linp_cn_blt_3_1n49ffqescc00_es2_occupancy_status_p_2_1078
            name: 餐厅 (点击跳转)
            icon: mdi:silverware-fork-knife
            tap_action:
              action: navigate
              navigation_path: /lovelace/dining
          - entity: sensor.linp_cn_1137691863_lp1bc_occupancy_status_p_5_1
            name: 卫生间(点击跳转)
            icon: mdi:toilet
            tap_action:
              action: navigate
              navigation_path: /lovelace/bathroom
          - entity: sensor.linp_cn_1161876236_hb01_occupancy_status_p_2_1
            name: 走廊 (点击跳转)
            icon: mdi:door
            tap_action:
              action: navigate
              navigation_path: /lovelace/hallway
          - entity: sensor.linp_cn_2079761645_ld6bcw_has_someone_duration_p_5_3
            name: 门口 (点击跳转)
            icon: mdi:door-open
            tap_action:
              action: navigate
              navigation_path: /lovelace/doorway

      # FDM打印机入口 - 进度条显示
      - type: vertical-stack
        cards:
          - type: entities
            title: FDM打印机
            entities:
              - entity: sensor.p2s_22e8bj5a2401765_print_status
                name: P2S 状态(点击跳转)
                icon: mdi:printer-3d-nozzle-outline
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/p2s-status
              - entity: sensor.p2s_22e8bj5a2401765_remaining_time
                name: P2S 剩余时间 (点击跳转)
                icon: mdi:clock-outline
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/p2s-status
              - entity: sensor.a1mini_0300aa5a1600497_print_status
                name: A1 Mini 状态(点击跳转)
                icon: mdi:printer-3d
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/a1mini
              - entity: sensor.a1mini_0300aa5a1600497_remaining_time
                name: A1 Mini 剩余时间 (点击跳转)
                icon: mdi:clock-outline
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/a1mini
          - type: gauge
            entity: sensor.p2s_22e8bj5a2401765_print_progress
            name: P2S (大黑奴 打印进度
            min: 0
            max: 100
            severity:
              green: 80
              yellow: 50
              red: 0
          - type: gauge
            entity: sensor.a1mini_0300aa5a1600497_print_progress
            name: A1 Mini (小黑奴 打印进度
            min: 0
            max: 100
            severity:
              green: 80
              yellow: 50
              red: 0

      # 灯控面板 - 4列网格
      - type: grid
        title: ?? 灯控面板
        columns: 4
        cards:
          - type: light
            entity: light.jdjz_cn_857569251_jdjzu1_s_2_light
            name: 客厅吸顶灯
          - type: light
            entity: light.lemesh_cn_1186971184_wy0c14_s_2_light
            name: 客厅沙发灯
          - type: light
            entity: light.ftd_cn_1124827030_dsplmp_s_2_light
            name: 卧室灯
          - type: light
            entity: light.yeelink_cn_436301383_strip6_s_2_light
            name: 卧室灯带
          - type: light
            entity: light.linp_cn_1137697716_lp1bc_s_2_light
            name: 厨房灯
          - type: light
            entity: light.lemesh_cn_1155789492_wy0c15_s_2_light
            name: 餐厅灯
          - type: light
            entity: light.linp_cn_1137691863_lp1bc_s_2_light
            name: 卫生间灯
          - type: light
            entity: light.yeelink_cn_942773473_v11_s_2_light
            name: 娴撮湼灯
          - type: light
            entity: light.giot_cn_1188250021_v8ssm_s_2_light
            name: 走廊璧伴亾灯
          - type: light
            entity: light.linp_cn_2023072411_ld6bcw_s_2_light
            name: 走廊卫生间灯
          - type: light
            entity: light.linp_cn_2079761645_ld6bcw_s_2_light
            name: 门口筒灯

      # 今日亮灯时长统计
      - type: entities
        title: ?? 今日亮灯时长
        entities:
          - entity: sensor.ke_ting_deng_jin_ri_liang_deng_shi_chang
            name: 客厅灯
            icon: mdi:lightbulb-on
          - entity: sensor.wo_shi_deng_jin_ri_liang_deng_shi_chang
            name: 卧室灯
            icon: mdi:lightbulb-on
          - entity: sensor.chu_fang_deng_jin_ri_liang_deng_shi_chang
            name: 厨房灯
            icon: mdi:lightbulb-on
          - entity: sensor.can_ting_deng_jin_ri_liang_deng_shi_chang
            name: 餐厅灯
            icon: mdi:lightbulb-on
          - entity: sensor.wei_sheng_jian_deng_jin_ri_liang_deng_shi_chang
            name: 卫生间灯
            icon: mdi:lightbulb-on
          - entity: sensor.zou_lang_deng_jin_ri_liang_deng_shi_chang
            name: 走廊灯
            icon: mdi:lightbulb-on
          - entity: sensor.men_kou_deng_jin_ri_liang_deng_shi_chang
            name: 门口灯
            icon: mdi:lightbulb-on
          - entity: sensor.jin_ri_liang_deng_zong_shi_chang
            name: 今日亮灯总时长
            icon: mdi:lightbulb-group

  # ==================== 功耗统计面板====================
  - title: 功耗统计
    icon: mdi:lightning-bolt
    path: power-stats
    cards:
      # 总实时功率+ 设备实时功耗
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.zong_shi_shi_gong_lu_4
            name: 总实时功率
            icon: mdi:flash
          - type: entities
            title: 设备实时功耗
            entities:
              - entity: sensor.wiing_cn_1169773877_v8icm_electric_power_p_4_2
                name: 豆浆机
              - entity: sensor.cuco_cn_2025564050_v3_electric_power_p_11_2
                name: 鐑ょ
              - entity: sensor.lumi_cn_684959720_mcn02_electric_power_p_5_1
                name: 绌鸿皟
              - entity: sensor.giot_cn_1162898415_v8icm_electric_power_p_4_2
                name: 取暖器
              - entity: sensor.giot_cn_1162942256_v8icm_electric_power_p_4_2
                name: 电脑
              - entity: sensor.giot_cn_1163256502_v8icm_electric_power_p_4_2
                name: NAS
              - entity: sensor.giot_cn_1164778814_v8icm_electric_power_p_4_2
                name: 小打印机
              - entity: sensor.sixwgh_cn_1200175237_v8icm1_electric_power_p_4_2
                name: 大打印机
              - entity: sensor.cuco_cn_860509913_v3_electric_power_p_11_2
                name: 洗衣机

      # 实时功率图表
      - type: history-graph
        title: 实时功率趋势
        entities:
          - entity: sensor.wiing_cn_1169773877_v8icm_electric_power_p_4_2
            name: 豆浆机
          - entity: sensor.cuco_cn_2025564050_v3_electric_power_p_11_2
            name: 鐑ょ
          - entity: sensor.lumi_cn_684959720_mcn02_electric_power_p_5_1
            name: 卧室空调
          - entity: sensor.giot_cn_1162898415_v8icm_electric_power_p_4_2
            name: 取暖器
          - entity: sensor.giot_cn_1162942256_v8icm_electric_power_p_4_2
            name: 客厅电脑电源
          - entity: sensor.giot_cn_1163256502_v8icm_electric_power_p_4_2
            name: NAS
          - entity: sensor.giot_cn_1164778814_v8icm_electric_power_p_4_2
            name: 小打印机
          - entity: sensor.sixwgh_cn_1200175237_v8icm1_electric_power_p_4_2
            name: 大打印机
          - entity: sensor.cuco_cn_860509913_v3_electric_power_p_11_2
            name: 洗衣机
        hours_to_show: 24
        refresh_interval: 30

      # 打印机统计数据 - 垂直布局避免文字截断
      - type: vertical-stack
        cards:
          - type: entities
            title: ??? 小黑奴（小打印机）
            entities:
              - entity: sensor.giot_cn_1164778814_v8icm_electric_power_p_4_2
                name: 实时功率
              - entity: sensor.xiao_da_yin_ji_jin_ri_yong_dian_kwh
                name: 今日用电
              - entity: sensor.xiao_da_yin_ji_ben_zhou_yong_dian_kwh
                name: 本周用电
              - entity: sensor.xiao_da_yin_ji_ben_yue_yong_dian_kwh
                name: 本月用电
              - entity: sensor.xiao_da_yin_ji_lei_ji_yong_dian_kwh
                name: 累计用电
          - type: entities
            title: ??? 大黑奴（大打印机）
            entities:
              - entity: sensor.sixwgh_cn_1200175237_v8icm1_electric_power_p_4_2
                name: 实时功率
              - entity: sensor.da_da_yin_ji_jin_ri_yong_dian_kwh
                name: 今日用电
              - entity: sensor.da_da_yin_ji_ben_zhou_yong_dian_kwh
                name: 本周用电
              - entity: sensor.da_da_yin_ji_ben_yue_yong_dian_kwh
                name: 本月用电
              - entity: sensor.da_da_yin_ji_lei_ji_yong_dian_kwh
                name: 累计用电

      # 打印机月总用电量
      - type: entity
        entity: sensor.da_yin_ji_yue_zong_yong_dian
        name: 打印机月总用电
        icon: mdi:printer-3d

      # 用电量统计
      - type: statistics-graph
        title: 用电量统计
        entities:
          - entity: sensor.wiing_cn_1169773877_v8icm_power_consumption_p_4_1
            name: 豆浆机
          - entity: sensor.cuco_cn_2025564050_v3_power_consumption_p_11_1
            name: 鐑ょ
          - entity: sensor.giot_cn_1162898415_v8icm_power_consumption_p_4_1
            name: 取暖器
          - entity: sensor.giot_cn_1162942256_v8icm_power_consumption_p_4_1
            name: 电脑电源
          - entity: sensor.giot_cn_1163256502_v8icm_power_consumption_p_4_1
            name: NAS
          - entity: sensor.giot_cn_1164778814_v8icm_power_consumption_p_4_1
            name: 小打印机
          - entity: sensor.sixwgh_cn_1200175237_v8icm1_power_consumption_p_4_1
            name: 大打印机
          - entity: sensor.cuco_cn_860509913_v3_power_consumption_p_11_1
            name: 洗衣机
        stat_types:
          - state
        period: day
        days_to_show: 7

      # 周/月/年用电量
      - type: entities
        title: 用电统计
        entities:
          - entity: sensor.ben_zhou_yong_dian
            name: 本周用电
            icon: mdi:calendar-week
          - entity: sensor.ben_yue_yong_dian
            name: 本月用电
            icon: mdi:calendar-month
          - entity: sensor.ben_nian_yong_dian
            name: 本年用电
            icon: mdi:calendar

      # 电费、日总用电、打印机月总用电
      - type: entities
        title: ?? 用电费用统计
        entities:
          - entity: sensor.jin_ri_zong_yong_dian_liang_3
            name: 今日总用电
            icon: mdi:counter
          - entity: sensor.da_yin_ji_yue_zong_yong_dian
            name: 打印机月总用电
            icon: mdi:printer-3d
          - entity: sensor.jin_ri_dian_fei
            name: 今日电费
          - entity: sensor.ben_yue_dian_fei
            name: 本月电费
          - entity: sensor.ben_nian_dian_fei
            name: 本年电费

  # ==================== 人在传感器分析面板====================
  - title: 人在分析
    icon: mdi:account-group
    path: presence-analysis
    cards:
      # 当前各区域状态
      - type: glance
        title: 当前区域状态
        entities:
          - entity: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
            name: 客厅
          - entity: sensor.linp_cn_blt_3_1ocv0fv7l0o00_es5b_occupancy_status_p_2_1078
            name: 卧室
          - entity: sensor.linp_cn_1137697716_lp1bc_occupancy_status_p_5_1
            name: 厨房
          - entity: sensor.linp_cn_blt_3_1n49ffqescc00_es2_occupancy_status_p_2_1078
            name: 餐厅
          - entity: sensor.linp_cn_1137691863_lp1bc_occupancy_status_p_5_1
            name: 卫生间
          - entity: sensor.linp_cn_1161876236_hb01_occupancy_status_p_2_1
            name: 走廊玄关
          - entity: sensor.linp_cn_2079761645_ld6bcw_has_someone_duration_p_5_3
            name: 门口
        show_state: true
        show_icon: true

      # 今日区域访问记录
      - type: history-graph
        title: 浠婃棩人在传感器触发记录
        entities:
          - entity: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
            name: 客厅
          - entity: sensor.linp_cn_blt_3_1ocv0fv7l0o00_es5b_occupancy_status_p_2_1078
            name: 卧室
          - entity: sensor.linp_cn_1137697716_lp1bc_occupancy_status_p_5_1
            name: 厨房
          - entity: sensor.linp_cn_blt_3_1n49ffqescc00_es2_occupancy_status_p_2_1078
            name: 餐厅
          - entity: sensor.linp_cn_1137691863_lp1bc_occupancy_status_p_5_1
            name: 卫生间
          - entity: sensor.linp_cn_1161876236_hb01_occupancy_status_p_2_1
            name: 走廊玄关
          - entity: sensor.linp_cn_2079761645_ld6bcw_has_someone_duration_p_5_3
            name: 门口
        hours_to_show: 24
        refresh_interval: 10

      # 区域访问频率统计
      - type: entities
        title: 今日区域访问统计
        entities:
          - entity: counter.living_room_visits
            name: 客厅访问次数
            icon: mdi:sofa
          - entity: counter.bedroom_visits
            name: 卧室访问次数
            icon: mdi:bed
          - entity: counter.kitchen_visits
            name: 厨房访问次数
            icon: mdi:stove
          - entity: counter.dining_visits
            name: 餐厅访问次数
            icon: mdi:silverware-fork-knife
          - entity: counter.bathroom_visits
            name: 卫生间访问次数
            icon: mdi:toilet
          - entity: counter.hallway_visits
            name: 走廊玄关访问次数
            icon: mdi:door
          - entity: counter.doorway_visits
            name: 门口访问次数
            icon: mdi:door-open

      # 区域停留时长统计
      - type: entities
        title: 今日区域停留时长
        entities:
          - entity: sensor.ke_ting_ting_liu_shi_chang
            name: 客厅停留时长
            icon: mdi:sofa
          - entity: sensor.wo_shi_ting_liu_shi_chang
            name: 卧室停留时长
            icon: mdi:bed
          - entity: sensor.chu_fang_ting_liu_shi_chang
            name: 厨房停留时长
            icon: mdi:stove
          - entity: sensor.can_ting_ting_liu_shi_chang
            name: 餐厅停留时长
            icon: mdi:silverware-fork-knife
          - entity: sensor.wei_sheng_jian_ting_liu_shi_chang
            name: 卫生间停留时长
            icon: mdi:toilet
          - entity: sensor.zou_lang_xuan_guan_ting_liu_shi_chang
            name: 走廊玄关停留时长
            icon: mdi:door
          - entity: sensor.men_kou_ting_liu_shi_chang
            name: 门口停留时长
            icon: mdi:door-open

      # 最常访问区域
      - type: entity
        entity: sensor.jin_ri_zui_chang_fang_wen_qu_yu
        name: 今日最常访问区域
        icon: mdi:trophy

      # 最长停留区域
      - type: entity
        entity: sensor.jin_ri_zui_chang_ting_liu_qu_yu
        name: 今日最长停留区域
        icon: mdi:clock

      # 周统计图表
      - type: statistics-graph
        title: 本周区域访问趋势
        entities:
          - entity: counter.living_room_visits
            name: 客厅
          - entity: counter.bedroom_visits
            name: 卧室
          - entity: counter.kitchen_visits
            name: 厨房
          - entity: counter.dining_visits
            name: 餐厅
        stat_types:
          - sum
        period: day
        days_to_show: 7

  # ==================== 客厅区域详情 ====================
  - title: 客厅
    icon: mdi:sofa
    path: living-room
    cards:
      - type: grid
        title: ?? 客厅灯光
        columns: 2
        cards:
          - type: light
            entity: light.jdjz_cn_857569251_jdjzu1_s_2_light
            name: 吸顶灯
          - type: light
            entity: light.lemesh_cn_1186971184_wy0c14_s_2_light
            name: 沙发灯
      - type: entities
        title: 客厅状态
        entities:
          - entity: sensor.linp_cn_blt_3_1n20sdaek4k01_es4b_occupancy_status_p_2_1078
            name: 人在传感器
          - entity: sensor.ke_ting_ting_liu_shi_chang_3
            name: 停留时长
          - entity: counter.living_room_visits
            name: 访问次数
          - entity: sensor.giot_cn_1162942256_v8icm_electric_power_p_4_2
            name: 电脑电源功率
          - entity: sensor.giot_cn_1162942256_v8icm_power_consumption_p_4_1
